# Nginx configuration for RAG Chatbot
# Deploy to: /etc/nginx/conf.d/rag-chatbot.conf

server {
    listen 80;
    server_name _;

    # Logs
    access_log /var/log/nginx/rag-chatbot-access.log;
    error_log /var/log/nginx/rag-chatbot-error.log;

    # Serve React frontend
    root /var/www/rag-chatbot/frontend;
    index index.html;

    # Proxy API requests to FastAPI backend
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check for ALB
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # Serve React app (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
